name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build needs *something* in these slots — they are validated at startup.
          # Real values live in Vercel; CI only verifies the bundle compiles.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: example-anon-key

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm install

      - name: Run unit tests
        run: npm test

  e2e:
    name: Smoke test (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on pushes to main (not on every PR to avoid hammering prod)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Don't block merges while the test account is being set up
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        # Use npm install (not ci) so Playwright is resolved from package.json
        # even before a full lockfile commit. Safe here since e2e is non-blocking.
        run: npm install

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test
        env:
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          BASE_URL: https://kodatrade.co.uk

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
